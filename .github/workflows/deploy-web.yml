name: Deploy Frontend — BookAgent Web

on:
  push:
    branches:
      - main
      - claude/bookagent-product-vision-e5FVg
    paths:
      - 'web/**'
      - '.github/workflows/deploy-web.yml'

  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'preview'
        type: choice
        options:
          - preview
          - production

jobs:
  # ────────────────────────────────────────────────────────────────────────
  # Job 1: Build & Test
  # ────────────────────────────────────────────────────────────────────────
  build:
    name: Build Next.js
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        working-directory: web
        run: npm ci

      - name: Build
        working-directory: web
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: https://api-bookagent.db8intelligence.com.br

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: nextjs-build
          path: web/.next
          retention-days: 1

  # ────────────────────────────────────────────────────────────────────────
  # Job 2: Backend Tests (TypeScript + Vitest)
  # ────────────────────────────────────────────────────────────────────────
  test-backend:
    name: Backend Tests (89 tests)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test

  # ────────────────────────────────────────────────────────────────────────
  # Job 3: Deploy to Vercel (preview)
  # ────────────────────────────────────────────────────────────────────────
  deploy-preview:
    name: Deploy Preview
    runs-on: ubuntu-latest
    needs: [build, test-backend]
    if: github.ref != 'refs/heads/main' || github.event.inputs.environment == 'preview'
    environment:
      name: preview
      url: ${{ steps.vercel-deploy.outputs.url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel environment
        working-directory: web
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }} --scope=${{ secrets.VERCEL_TEAM_ID }}

      - name: Build for Vercel
        working-directory: web
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel (preview)
        id: vercel-deploy
        working-directory: web
        run: |
          URL=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }} --scope=${{ secrets.VERCEL_TEAM_ID }})
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "✅ Preview: $URL"

  # ────────────────────────────────────────────────────────────────────────
  # Job 4: Deploy to Production
  # ────────────────────────────────────────────────────────────────────────
  deploy-production:
    name: Deploy Production
    runs-on: ubuntu-latest
    needs: [build, test-backend]
    if: github.ref == 'refs/heads/main' && github.event.inputs.environment != 'preview'
    environment:
      name: production
      url: https://bookagent.db8intelligence.com.br

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel environment
        working-directory: web
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }} --scope=${{ secrets.VERCEL_TEAM_ID }}

      - name: Build for Vercel
        working-directory: web
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel (production)
        working-directory: web
        run: |
          URL=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }} --scope=${{ secrets.VERCEL_TEAM_ID }})
          echo "✅ Production: $URL"
